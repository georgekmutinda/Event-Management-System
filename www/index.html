<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventara — Luxury Event Management Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/views.css">
  <link rel="stylesheet" href="css/payment.css">
</head>
<body>

  <!-- ══════════════ AUTH PAGE ══════════════ -->
  <div id="auth-page">
    <div class="auth-bg"></div>
    <div class="auth-orb"></div>
    <div class="auth-orb2"></div>
    <div class="auth-card">
      <div class="auth-logo">Event<span>ara</span></div>
      <div class="auth-tagline">Luxury Event Management Platform</div>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login', this)">Sign In</button>
        <button class="auth-tab" onclick="switchAuthTab('register', this)">Create Account</button>
      </div>

      <!-- ── LOGIN ── -->
      <div id="login-form">
        <div class="auth-field">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="you@company.com" autocomplete="email">
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••••" autocomplete="current-password"
                 onkeydown="if(event.key==='Enter') handleLogin(event)">
        </div>
        <button class="auth-btn" id="login-btn" onclick="handleLogin(event)">Sign In to Platform</button>
        <div class="auth-divider">or continue as</div>
        <button class="auth-alt-link" onclick="handleGuestDemo()">Continue as Guest → Demo</button>
      </div>

      <!-- ── REGISTER ── -->
      <div id="register-form" style="display:none">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div class="auth-field">
            <label>Full Name</label>
            <input type="text" id="reg-fullname" placeholder="Jane Doe" autocomplete="name">
          </div>
          <div class="auth-field">
            <label>Role</label>
            <select id="register-role" class="form-control" style="height:48px">
              <option value="Planner">Planner</option>
              <option value="Vendor">Vendor</option>
              <option value="Attendee" selected>Attendee</option>
              <option value="ServiceProvider">Service Provider</option>
            </select>
          </div>
        </div>
        <div class="auth-field">
          <label>Email Address</label>
          <input type="email" id="reg-email" placeholder="you@company.com" autocomplete="email">
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min 8 characters" autocomplete="new-password"
                 onkeydown="if(event.key==='Enter') handleRegister()">
        </div>
        <button class="auth-btn" id="register-btn" onclick="handleRegister()">Create My Account</button>
      </div>
    </div>
  </div>

  <!-- ══════════════ APP PAGE ══════════════ -->
  <div id="app-page" style="display:none">
    <div class="portal-wrapper">

      <!-- SIDEBAR -->
      <aside class="sidebar" id="main-sidebar">
        <div class="sidebar-logo">Event<span>ara</span></div>
        <div id="sidebar-role-badge" class="sidebar-role-badge role-admin">Administrator</div>
        <div id="sidebar-nav"></div>
        <div class="sidebar-bottom">
          <div class="user-pill" onclick="logout()">
            <div class="user-avatar" id="user-avatar-initials">AU</div>
            <div class="user-info-text">
              <div class="user-name" id="user-display-name">User</div>
              <div class="user-role" id="user-display-role">Role</div>
            </div>
            <svg style="width:14px;height:14px;margin-left:auto;color:rgba(255,255,255,0.25)"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
            </svg>
          </div>
        </div>
      </aside>

      <!-- MAIN -->
      <div class="main-wrap">
        <header class="topbar">
          <div class="topbar-left">
            <div>
              <div class="page-title" id="page-title">Dashboard</div>
              <div class="breadcrumb">
                <span>Eventara</span><span>›</span><span id="bc-cur">Dashboard</span>
              </div>
            </div>
          </div>
          <div class="topbar-right">
            <div class="search-bar">
              <svg style="width:15px;height:15px;color:#BFB89E;flex-shrink:0"
                   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
              <input placeholder="Search events, vendors…">
            </div>
            <div class="notif-dot">
              <svg style="width:16px;height:16px;color:#8A8070"
                   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/>
              </svg>
            </div>
            <button class="topbar-btn btn-primary" id="topbar-action" onclick="handleTopbarAction()" style="display:none">
              + Create
            </button>
          </div>
        </header>

        <!-- Global loading spinner -->
        <div id="global-loading" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:9999;align-items:center;justify-content:center">
          <div style="width:40px;height:40px;border:3px solid rgba(201,168,76,.3);border-top-color:#c9a84c;border-radius:50%;animation:spin .7s linear infinite"></div>
        </div>

        <div class="content" id="main-content">
          <!-- Views injected dynamically -->
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════ CREATE / EDIT MODAL ══════════════ -->
  <div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">Create</div>
        <button class="modal-close" onclick="closeModal(null)">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- ══════════════ PAYMENT MODAL ══════════════ -->
  <div class="modal-backdrop" id="payment-modal" onclick="closePaymentModal(event)" style="display:none">
    <div class="modal pay-modal">
      <div class="modal-header">
        <div class="modal-title">💳 Make Payment</div>
        <button class="modal-close" onclick="closePaymentModal(null)">✕</button>
      </div>
      <div class="modal-body" id="payment-modal-body"></div>
    </div>
  </div>

  <!-- ══════════════ DELETE CONFIRM MODAL ══════════════ -->
  <div class="modal-backdrop" id="delete-modal" onclick="closeDeleteModal(event)" style="display:none">
    <div class="modal" style="width:400px">
      <div class="modal-header">
        <div class="modal-title" style="font-size:20px;color:#C0392B">Confirm Delete</div>
        <button class="modal-close" onclick="closeDeleteModal(null)">✕</button>
      </div>
      <div class="modal-body">
        <p style="font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.7">
          This action is <strong>permanent</strong> and cannot be undone.
        </p>
        <div style="display:flex;gap:10px">
          <button class="btn-delete-confirm" onclick="doDelete()">Yes, Delete</button>
          <button class="topbar-btn btn-ghost" style="flex:1" onclick="closeDeleteModal(null)">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════ SPINNER KEYFRAME ══════════════ -->
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <!-- ══════════════ SCRIPTS ══════════════ -->
 
  <script src="js/config.js" defer></script>
  <script src="js/views.js" defer></script>
   <script src="js/api.js" defer></script>
  <script src="js/app.js" defer></script>
  <script src="js/payments.js" defer></script>
  <script src="js/modals.js" defer></script>
  
</body>
</html>
